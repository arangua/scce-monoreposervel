name: CI E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scce
          POSTGRES_PASSWORD: scce
          POSTGRES_DB: scce_test
        ports:
          - 54329:5432
        options: >-
          --health-cmd="pg_isready -U scce -d scce_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (workspaces, nested)
        run: |
          npm ci --workspaces --include-workspace-root --install-strategy=nested

      - name: Ensure prisma client is local to api
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -f "api/node_modules/@prisma/client/package.json" ]; then
            echo "api/node_modules/@prisma/client missing -> installing @prisma/client locally in api (deterministic)"
            npm --prefix api ci || npm --prefix api install
          fi
          ls -la api/node_modules/@prisma/client/package.json

      - name: Debug jest e2e files
        working-directory: api
        run: |
          ls -la test || true
          cat jest-e2e.json || true
          node -p "require('./package.json').devDependencies.jest"
          node -p "require('./package.json').devDependencies['ts-jest']"

      - name: Verify tsconfig files exist
        run: |
          ls -la api/tsconfig.json
          ls -la api/tsconfig.build.json
          cat api/tsconfig.json | head -n 5

      - name: Verify e2e setup file exists (api cwd)
        working-directory: api
        run: |
          pwd
          ls -la
          ls -la test
          ls -la test/jest-e2e.setup.ts
          cat jest-e2e.json

      - name: Debug paths (api)
        working-directory: api
        run: |
          pwd
          ls -la
          ls -la src || true
          ls -la src/app.module.ts || true
          find src -maxdepth 3 -type f -name "app.module.*" -print || true
          node -p "require('fs').existsSync('src/app.module.ts')"
          cat jest-e2e.json

      - name: Run E2E
        working-directory: api
        env:
          DATABASE_URL: postgresql://scce:scce@localhost:54329/scce_test?schema=public
        run: |
          npm run prisma:migrate:deploy
          npm run prisma:generate
          npm run test:e2e
