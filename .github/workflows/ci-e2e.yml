name: CI E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scce
          POSTGRES_PASSWORD: scce
          POSTGRES_DB: scce_test
        ports:
          - 54329:5432
        options: >-
          --health-cmd="pg_isready -U scce -d scce_test"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (workspaces, nested)
        run: |
          npm ci --workspaces --include-workspace-root --install-strategy=nested

      - name: Verify @prisma/client present in api node_modules
        working-directory: api
        run: |
          ls -la node_modules/@prisma/client/package.json
          node -p "require.resolve('@prisma/client/package.json')"
          npm run prisma:generate

      - name: Run E2E
        working-directory: api
        env:
          DATABASE_URL: postgresql://scce:scce@localhost:54329/scce_test?schema=public
        run: |
          npm run prisma:migrate:deploy
          npm run prisma:generate
          npm run test:e2e
