name: scce_api_test

services:
  db_test:
    image: postgres:16
    container_name: scce_api_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scce_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scce_test"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - scce_api_test_db:/var/lib/postgresql/data

volumes:
  scce_api_test_db:
